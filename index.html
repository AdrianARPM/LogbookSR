<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logbook Logistik — Viewer</title>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', 'sans-serif'],
            body:    ['"DM Sans"', 'sans-serif'],
            mono:    ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            brand:  { DEFAULT: '#f97316', dim: '#ea6c0c', glow: 'rgba(249,115,22,0.15)' },
            canvas: '#f7f6f3',
            ink:    { DEFAULT: '#1a1a1a', soft: '#4a4a4a', muted: '#8a8a8a' },
            rule:   '#e2e0db',
          },
        },
      },
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- SheetJS (Excel export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7f6f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Custom scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f7f6f3; }
    ::-webkit-scrollbar-thumb { background: #d1cec9; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #f97316; }

    /* ── Header grain overlay ── */
    .grain::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; border-radius: inherit;
    }

    /* ── Table ── */
    .data-table { border-collapse: collapse; width: 100%; }
    .data-table th {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: #8a8a8a; padding: 10px 16px 10px 0;
      border-bottom: 2px solid #e2e0db;
      white-space: nowrap; text-align: left;
    }
    .data-table th:first-child { padding-left: 16px; }
    .data-table td {
      padding: 13px 16px 13px 0;
      border-bottom: 1px solid #eeecea;
      font-size: 14px; vertical-align: middle;
      color: #1a1a1a;
    }
    .data-table td:first-child { padding-left: 16px; }
    .data-table tbody tr:hover td { background: rgba(249,115,22,0.04); }
    .data-table tbody tr:last-child td { border-bottom: none; }

    /* ── Group header row ── */
    .group-row td {
      background: #1a1a1a !important;
      color: #f7f6f3 !important;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 8px 16px !important;
      border-bottom: none !important;
    }
    .group-row:hover td { background: #1a1a1a !important; }

    /* ── Status badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; letter-spacing: .3px;
      white-space: nowrap;
    }
    .badge-masuk   { background: #dbeafe; color: #1d4ed8; }
    .badge-loading { background: #fef9c3; color: #a16207; }
    .badge-keluar  { background: #dcfce7; color: #15803d; }

    /* ── Dot indicator ── */
    .dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      display: inline-block;
    }
    .dot-masuk   { background: #3b82f6; }
    .dot-loading { background: #eab308; }
    .dot-keluar  { background: #22c55e; }

    /* ── Time chip ── */
    .time-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 600;
    }
    .time-empty { color: #d1cec9; font-style: italic; font-size: 12px; }

    /* ── Filter card ── */
    .filter-select, .filter-input {
      background: #fff; border: 1.5px solid #e2e0db;
      border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: #1a1a1a;
      padding: 9px 12px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .filter-select:focus, .filter-input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }

    /* ── Buttons ── */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 7px;
      background: #f97316; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      padding: 9px 18px; transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .btn-primary:hover  { background: #ea6c0c; }
    .btn-primary:active { transform: scale(.97); }

    .btn-outline {
      display: inline-flex; align-items: center; gap: 7px;
      background: #fff; color: #1a1a1a;
      border: 1.5px solid #e2e0db; border-radius: 8px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      padding: 9px 18px; transition: all .15s;
      white-space: nowrap;
    }
    .btn-outline:hover  { border-color: #f97316; color: #f97316; background: rgba(249,115,22,.04); }
    .btn-outline:active { transform: scale(.97); }

    /* ── Stat card ── */
    .stat-card {
      background: #fff; border: 1.5px solid #e2e0db;
      border-radius: 12px; padding: 20px 24px;
      transition: box-shadow .2s;
    }
    .stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg,#eeece9 25%,#e5e3e0 50%,#eeece9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 72px 32px; color: #8a8a8a;
    }

    /* ── Fade-in ── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fadeUp .35s ease forwards; }

    /* ── No. column ── */
    .no-col { font-family:'JetBrains Mono',monospace; font-size:11px; color:#c0bcb5; }

    /* ── Responsive table wrapper ── */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a; color: #f7f6f3;
      border-radius: 10px; padding: 11px 22px;
      font-size: 13px; font-weight: 500;
      z-index: 9999; pointer-events: none;
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.ok   { border-left: 3px solid #22c55e; }
    #toast.err  { border-left: 3px solid #ef4444; }
    #toast.info { border-left: 3px solid #f97316; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════

═══════════════════════════════════════ -->
<div class="max-w-7xl mx-auto px-5 py-5">

    <div class="flex flex-wrap gap-3 items-end">

          <tr><td colspan="9"><div class="skeleton h-5 my-2 mx-4 rounded"></div></td></tr>

<!-- Toast -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════ -->
<script>
// ─── CONFIG ──────────────────────────────────────────────────
const SHEET_ID  = '16PDjsICmnpuJyUyZBmvs7kuBzNKi17ItWKjdu_bPhQw';
const SHEET_TAB = 'LOGBOOK';

// ─── STATE ───────────────────────────────────────────────────
let allData      = [];   // semua baris dari sheet (sudah parsed)
let filtered     = [];   // setelah filter diterapkan

// ─── TOAST ───────────────────────────────────────────────────
let toastTimer;
function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ─── FETCH DATA VIA gviz/tq ──────────────────────────────────
async function loadData() {
  document.getElementById('lastSync').textContent = 'Memuat…';
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_TAB)}&_=${Date.now()}`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    // Strip JSONP wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse(...);\n
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
    if (json.status !== 'ok') throw new Error(json.errors?.[0]?.message || 'Sheet error');
    allData = parseGvizTable(json.table);
    document.getElementById('lastSync').textContent = 'Diperbarui: ' + new Date().toLocaleTimeString('id-ID');
    populateFilterOptions();
    applyFilters();
    toast(`${allData.length} data berhasil dimuat`, 'ok');
  } catch(e) {
    document.getElementById('lastSync').textContent = 'Gagal memuat';
    document.getElementById('tableBody').innerHTML = `
      <tr><td colspan="9">
        <div class="empty-state">
          <div class="text-5xl mb-3">⚠️</div>
          <p class="font-semibold text-ink-soft mb-1">Gagal memuat data</p>
          <p class="text-sm text-ink-muted max-w-sm mx-auto">${e.message}<br><br>
            Pastikan Google Sheet sudah dibagikan: <strong>Anyone with link → Viewer</strong>
          </p>
        </div>
      </td></tr>`;
    toast('Gagal memuat: ' + e.message, 'err');
  }
}

// ─── PARSE gviz TABLE ────────────────────────────────────────
function parseGvizTable(table) {
  const cols = table.cols.map(c => c.label.trim());
  const rows = [];
  for (const row of (table.rows || [])) {
    const r = {};
    cols.forEach((col, i) => {
      const cell = row.c[i];
      r[col] = cell && cell.v !== null && cell.v !== undefined
        ? (cell.f !== undefined && cell.f !== null ? cell.f.toString().trim() : cell.v.toString().trim())
        : '';
    });
    if (!r['ID'] && !r['NAMA DRIVER']) continue; // skip empty rows
    rows.push(r);
  }
  return rows;
}

// ─── POPULATE FILTER DROPDOWNS ───────────────────────────────
function populateFilterOptions() {
  // Years
  const years   = [...new Set(allData.map(r => extractYear(r.TANGGAL)).filter(Boolean))].sort().reverse();
  const ySelect = document.getElementById('fYear');
  const curYear = ySelect.value;
  ySelect.innerHTML = '<option value="">Semua Tahun</option>';
  years.forEach(y => {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === curYear) o.selected = true;
    ySelect.appendChild(o);
  });

  // Drivers
  const drivers   = [...new Set(allData.map(r => r['NAMA DRIVER']).filter(Boolean))].sort();
  const dSelect   = document.getElementById('fDriver');
  const curDriver = dSelect.value;
  dSelect.innerHTML = '<option value="">Semua Driver</option>';
  drivers.forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    if (d === curDriver) o.selected = true;
    dSelect.appendChild(o);
  });

  // Plats
  const plats   = [...new Set(allData.map(r => r['PLAT KENDARAAN']).filter(Boolean))].sort();
  const pSelect = document.getElementById('fPlat');
  const curPlat = pSelect.value;
  pSelect.innerHTML = '<option value="">Semua Plat</option>';
  plats.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    if (p === curPlat) o.selected = true;
    pSelect.appendChild(o);
  });
}

// ─── DATE HELPERS ────────────────────────────────────────────
// Tanggal format: dd/MM/yyyy
function extractDay(d)   { return d ? d.substring(0,2)  : ''; }
function extractMonth(d) { return d ? d.substring(3,5)  : ''; }
function extractYear(d)  { return d ? d.substring(6,10) : ''; }

// Untuk sort: yyyy-mm-dd
function sortKey(d) {
  if (!d || d.length < 10) return '';
  return `${d.substring(6,10)}-${d.substring(3,5)}-${d.substring(0,2)}`;
}

// Human-readable tanggal
const HARI_ID  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const BULAN_ID = ['','Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
function formatTanggal(d) {
  if (!d || d.length < 10) return d || '—';
  const dd = parseInt(d.substring(0,2),10);
  const mm = parseInt(d.substring(3,5),10);
  const yy = parseInt(d.substring(6,10),10);
  const dt = new Date(yy, mm-1, dd);
  return `${HARI_ID[dt.getDay()]}, ${dd} ${BULAN_ID[mm]} ${yy}`;
}

// ─── DURATION ────────────────────────────────────────────────
function diffMins(t1, t2) {
  if (!t1 || !t2) return null;
  const [h1,m1] = t1.split(':').map(Number);
  const [h2,m2] = t2.split(':').map(Number);
  if (isNaN(h1)||isNaN(m1)||isNaN(h2)||isNaN(m2)) return null;
  return (h2*60+m2) - (h1*60+m1);
}
function fmtDur(mins) {
  if (mins === null || isNaN(mins)) return '—';
  if (mins < 0) return '—';
  const h = Math.floor(mins/60), m = mins%60;
  if (h > 0) return `${h}j ${m}m`;
  return `${m}m`;
}

// ─── STATUS ──────────────────────────────────────────────────
function getStatus(row) {
  if (row['JAM KELUAR']  && row['JAM KELUAR'].trim()  !== '') return 'keluar';
  if (row['JAM LOADING'] && row['JAM LOADING'].trim() !== '') return 'loading';
  return 'masuk';
}
const STATUS_LABEL = { masuk:'Masuk',loading:'Loading',keluar:'Keluar' };

// ─── APPLY FILTERS ───────────────────────────────────────────
function applyFilters() {
  const fDate   = document.getElementById('fDate').value;       // yyyy-MM-dd
  const fMonth  = document.getElementById('fMonth').value;      // MM
  const fYear   = document.getElementById('fYear').value;       // yyyy
  const fDriver = document.getElementById('fDriver').value;
  const fPlat   = document.getElementById('fPlat').value;

  filtered = allData.filter(r => {
    const d = r.TANGGAL || '';
    if (fDate) {
      // fDate = "yyyy-MM-dd", d = "dd/MM/yyyy"
      const [fy,fm,fd] = fDate.split('-');
      if (extractDay(d) !== fd || extractMonth(d) !== fm || extractYear(d) !== fy) return false;
    }
    if (fMonth  && extractMonth(d) !== fMonth)  return false;
    if (fYear   && extractYear(d)  !== fYear)   return false;
    if (fDriver && r['NAMA DRIVER']    !== fDriver) return false;
    if (fPlat   && r['PLAT KENDARAAN'] !== fPlat)   return false;
    return true;
  });

  updateStats(filtered);
  renderChips(fDate, fMonth, fYear, fDriver, fPlat);
  renderTable();

  document.getElementById('resultMeta').textContent =
    `Menampilkan ${filtered.length} dari ${allData.length} data`;
  const gw = document.getElementById('groupToggleWrap');
  gw.className = filtered.length ? 'flex' : 'hidden';
}

// ─── STATS ───────────────────────────────────────────────────
function updateStats(data) {
  const total   = data.length;
  const masuk   = data.filter(r => getStatus(r) === 'masuk').length;
  const loading = data.filter(r => getStatus(r) === 'loading').length;
  const keluar  = data.filter(r => getStatus(r) === 'keluar').length;
  const avgDur  = (() => {
    const durs = data.map(r => diffMins(r['JAM MASUK'], r['JAM KELUAR'])).filter(v=>v!==null&&v>0);
    if (!durs.length) return null;
    return Math.round(durs.reduce((a,b)=>a+b,0)/durs.length);
  })();

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card fade-up">
      <div class="text-4xl font-display text-ink leading-none">${total}</div>
      <div class="text-[10px] font-semibold tracking-widest uppercase text-ink-muted mt-2">Total Driver</div>
    </div>
    <div class="stat-card fade-up" style="animation-delay:.05s">
      <div class="text-4xl font-display text-blue-600 leading-none">${masuk}</div>
      <div class="text-[10px] font-semibold tracking-widest uppercase text-ink-muted mt-2">Masuk</div>
    </div>
    <div class="stat-card fade-up" style="animation-delay:.1s">
      <div class="text-4xl font-display text-yellow-600 leading-none">${loading}</div>
      <div class="text-[10px] font-semibold tracking-widest uppercase text-ink-muted mt-2">Loading</div>
    </div>
    <div class="stat-card fade-up" style="animation-delay:.15s">
      <div class="text-4xl font-display text-green-600 leading-none">${keluar}</div>
      <div class="text-[10px] font-semibold tracking-widest uppercase text-ink-muted mt-2">
        Keluar${avgDur !== null ? `<span class="text-ink-muted font-normal normal-case tracking-normal"> · rata-rata ${fmtDur(avgDur)}</span>` : ''}
      </div>
    </div>`;
}

// ─── RENDER TABLE ────────────────────────────────────────────
function renderTable() {
  const tbody  = document.getElementById('tableBody');
  const group  = document.getElementById('groupToggle').checked;

  if (!filtered.length) {
    tbody.innerHTML = `
      <tr><td colspan="9">
        <div class="empty-state">
          <div class="text-5xl mb-3">🔍</div>
          <p class="font-semibold text-ink-soft mb-1">Tidak ada data</p>
          <p class="text-sm text-ink-muted">Coba ubah filter pencarian</p>
        </div>
      </td></tr>`;
    return;
  }

  // Sort by tanggal ASC, then jamMasuk ASC
  const sorted = [...filtered].sort((a,b) => {
    const dk = sortKey(a.TANGGAL).localeCompare(sortKey(b.TANGGAL));
    if (dk !== 0) return dk;
    return (a['JAM MASUK']||'').localeCompare(b['JAM MASUK']||'');
  });

  if (group) {
    // Kelompokkan per tanggal
    const groups = {};
    sorted.forEach(r => {
      const k = r.TANGGAL || 'Tanggal Kosong';
      if (!groups[k]) groups[k] = [];
      groups[k].push(r);
    });

    let html = ''; let no = 1;
    for (const [tanggal, rows] of Object.entries(groups)) {
      html += `
        <tr class="group-row">
          <td colspan="9">
            📅 &nbsp;${formatTanggal(tanggal)}
            <span style="color:#f97316;margin-left:12px">${rows.length} driver</span>
          </td>
        </tr>`;
      rows.forEach(r => { html += buildRow(r, no++); });
    }
    tbody.innerHTML = html;
  } else {
    tbody.innerHTML = sorted.map((r,i) => buildRow(r, i+1)).join('');
  }
}

function buildRow(r, no) {
  const status = getStatus(r);
  const dur    = diffMins(r['JAM MASUK'], r['JAM KELUAR']);
  const badgeMap = {
    masuk:   `<span class="badge badge-masuk"><span class="dot dot-masuk"></span>${STATUS_LABEL.masuk}</span>`,
    loading: `<span class="badge badge-loading"><span class="dot dot-loading"></span>${STATUS_LABEL.loading}</span>`,
    keluar:  `<span class="badge badge-keluar"><span class="dot dot-keluar"></span>${STATUS_LABEL.keluar}</span>`,
  };
  const timeCell = t => t && t.trim()
    ? `<span class="time-chip">${esc(t)}</span>`
    : `<span class="time-empty">—</span>`;

  return `
    <tr class="fade-up">
      <td class="no-col">${String(no).padStart(2,'0')}</td>
      <td class="font-semibold">${esc(r['NAMA DRIVER']||'—')}</td>
      <td>
        <span class="font-mono text-xs bg-canvas border border-rule px-2 py-1 rounded-md tracking-widest">
          ${esc(r['PLAT KENDARAAN']||'—')}
        </span>
      </td>
      <td class="text-sm text-ink-soft">${esc(r.TANGGAL||'—')}</td>
      <td>${timeCell(r['JAM MASUK'])}</td>
      <td>${timeCell(r['JAM LOADING'])}</td>
      <td>${timeCell(r['JAM KELUAR'])}</td>
      <td>${badgeMap[status]}</td>
      <td class="text-sm text-ink-muted">${fmtDur(dur)}</td>
    </tr>`;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── FILTER CHIPS ────────────────────────────────────────────
function renderChips(fDate, fMonth, fYear, fDriver, fPlat) {
  const chips = [];
  if (fDate)   chips.push([`📅 ${fDate}`,       () => { document.getElementById('fDate').value='';   applyFilters(); }]);
  if (fMonth)  chips.push([`📆 Bulan ${fMonth}`, () => { document.getElementById('fMonth').value=''; applyFilters(); }]);
  if (fYear)   chips.push([`🗓 Tahun ${fYear}`,  () => { document.getElementById('fYear').value='';  applyFilters(); }]);
  if (fDriver) chips.push([`🧑 ${fDriver}`,      () => { document.getElementById('fDriver').value='';applyFilters(); }]);
  if (fPlat)   chips.push([`🚐 ${fPlat}`,        () => { document.getElementById('fPlat').value='';  applyFilters(); }]);

  const wrap = document.getElementById('filterChips');
  if (!chips.length) { wrap.className = 'hidden flex-wrap gap-2 mt-4 pt-4 border-t border-rule'; return; }
  wrap.className = 'flex flex-wrap gap-2 mt-4 pt-4 border-t border-rule';
  wrap.innerHTML = chips.map(([label], i) => `
    <button onclick="filterChipRemove(${i})"
      class="flex items-center gap-1.5 text-xs font-semibold bg-brand/10 text-brand
             border border-brand/25 rounded-full px-3 py-1 hover:bg-brand/20 transition-colors">
      ${label} &nbsp;✕
    </button>`).join('');
  wrap._chips = chips;
}
function filterChipRemove(i) { document.getElementById('filterChips')._chips[i][1](); }

function resetFilters() {
  ['fDate','fMonth','fYear','fDriver','fPlat'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
  });
  applyFilters();
}

// ─── EXPORT EXCEL ────────────────────────────────────────────
function exportExcel() {
  if (!filtered.length) { toast('Tidak ada data untuk diekspor','err'); return; }

  // Build export rows (tanpa kolom LAT/LNG untuk keterbacaan, bisa ditambah)
  const headers = ['No','Nama Driver','Plat Kendaraan','Tanggal','Jam Masuk','Jam Loading','Jam Keluar','Status','Durasi (menit)'];
  const rows    = filtered.map((r,i) => {
    const s   = getStatus(r);
    const dur = diffMins(r['JAM MASUK'], r['JAM KELUAR']);
    return [
      i+1,
      r['NAMA DRIVER']    || '',
      r['PLAT KENDARAAN'] || '',
      r.TANGGAL           || '',
      r['JAM MASUK']      || '',
      r['JAM LOADING']    || '',
      r['JAM KELUAR']     || '',
      STATUS_LABEL[s],
      dur !== null ? dur : ''
    ];
  });

  const wb  = XLSX.utils.book_new();
  const ws  = XLSX.utils.aoa_to_sheet([headers, ...rows]);

  // Column widths
  ws['!cols'] = [4,22,16,16,11,11,11,12,14].map(w => ({ wch: w }));

  // Style header row (XLSX.js basic)
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let c = range.s.c; c <= range.e.c; c++) {
    const addr = XLSX.utils.encode_cell({r:0, c});
    if (!ws[addr]) continue;
    ws[addr].s = { font:{bold:true}, fill:{fgColor:{rgb:'1A1A1A'}}, font:{bold:true,color:{rgb:'FFFFFF'}} };
  }

  XLSX.utils.book_append_sheet(wb, ws, 'Logbook');

  const fDate   = document.getElementById('fDate').value;
  const fMonth  = document.getElementById('fMonth').value;
  const fYear   = document.getElementById('fYear').value;
  const suffix  = fDate ? fDate : (fMonth ? `${fMonth}-${fYear||'all'}` : (fYear||'all'));
  XLSX.writeFile(wb, `logbook_${suffix}_${Date.now()}.xlsx`);
  toast(`${filtered.length} data berhasil diekspor ✓`, 'ok');
}

// ─── INIT ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadData);
</script>
